<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bus Arrival Tracker</title>
  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
      --dark: #0f172a;
      --light: #f1f5f9;
      --green: #15803d;
      --green-dark: #166534;
      --green-light: #dcfce7;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 16px;
    }

    header {
      background: var(--card);
      border-radius: 22px;
      padding: 20px;
      box-shadow: 0 1px 4px rgba(15, 23, 42, 0.08);
      margin-bottom: 16px;
    }

    .top-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      align-items: flex-start;
    }

    .badge {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      background: var(--light);
      border-radius: 999px;
      padding: 7px 12px;
      font-size: 14px;
      font-weight: 700;
      color: #334155;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0;
      font-size: 30px;
      line-height: 1.1;
    }

    .subtitle {
      color: var(--muted);
      margin: 10px 0 0;
      font-size: 16px;
    }

    button {
      font: inherit;
      cursor: pointer;
      border: 0;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .small-button {
      border-radius: 14px;
      padding: 10px 14px;
      background: var(--light);
      color: var(--text);
      font-weight: 700;
      border: 1px solid var(--border);
    }

    .small-button:hover { background: #e2e8f0; }

    .tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }

    .tab {
      background: var(--card);
      border: 2px solid transparent;
      border-radius: 20px;
      padding: 14px;
      text-align: left;
      box-shadow: 0 1px 4px rgba(15, 23, 42, 0.06);
    }

    .tab.active { border-color: var(--dark); }

    .tab-title {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .tab-count {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 10px;
    }

    .percent {
      font-size: 24px;
      font-weight: 900;
      float: right;
    }

    .bar {
      height: 8px;
      background: var(--light);
      border-radius: 999px;
      overflow: hidden;
      clear: both;
    }

    .bar-fill {
      height: 100%;
      width: 0%;
      background: var(--dark);
      border-radius: 999px;
    }

    .panel {
      background: var(--card);
      border-radius: 22px;
      box-shadow: 0 1px 4px rgba(15, 23, 42, 0.08);
      padding: 16px;
      margin-bottom: 16px;
    }

    .panel-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: end;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .panel h2 {
      margin: 0;
      font-size: 24px;
    }

    .panel h3 {
      margin: 0;
      font-size: 19px;
    }

    .panel-meta {
      color: var(--muted);
      margin-top: 6px;
    }

    .search {
      width: min(100%, 320px);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 11px 12px;
      font-size: 16px;
    }

    .arrival-order {
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      border-radius: 20px;
      padding: 14px;
      margin-bottom: 16px;
    }

    .section-heading {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      margin-bottom: 12px;
    }

    .section-count {
      color: var(--muted);
      font-size: 14px;
    }

    .arrival-list {
      display: grid;
      gap: 10px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .arrival-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      background: var(--green);
      color: #ffffff;
      border-radius: 18px;
      padding: 12px;
      box-shadow: 0 1px 3px rgba(15, 23, 42, 0.12);
    }

    .arrival-left {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .arrival-number {
      width: 32px;
      height: 32px;
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      border-radius: 999px;
      background: #ffffff;
      color: var(--green-dark);
      font-weight: 900;
    }

    .arrival-school {
      font-weight: 900;
      margin-bottom: 2px;
    }

    .arrival-details {
      color: var(--green-light);
      font-size: 14px;
    }

    .undo-button {
      flex: 0 0 auto;
      border-radius: 12px;
      padding: 8px 11px;
      font-weight: 800;
      color: #ffffff;
      background: rgba(255, 255, 255, 0.18);
    }

    .undo-button:hover { background: rgba(255, 255, 255, 0.28); }

    .bus-list {
      display: grid;
      gap: 10px;
    }

    .bus-row {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 14px;
      text-align: left;
      color: var(--text);
    }

    .bus-row:hover { border-color: #94a3b8; }

    .bus-left {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .check {
      width: 34px;
      height: 34px;
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      border-radius: 999px;
      border: 2px solid #cbd5e1;
      font-weight: 900;
      font-size: 20px;
    }

    .school {
      font-size: 18px;
      font-weight: 900;
      margin-bottom: 3px;
    }

    .details {
      font-size: 14px;
      color: var(--muted);
    }

    .bus-time {
      text-align: right;
      white-space: nowrap;
      font-weight: 800;
    }

    .time-small {
      font-size: 13px;
      margin-top: 3px;
      color: var(--muted);
      font-weight: 400;
    }

    .empty {
      color: var(--muted);
      padding: 18px;
      text-align: center;
      border: 1px dashed var(--border);
      border-radius: 16px;
      background: #ffffff;
    }

    @media (max-width: 700px) {
      .container { padding: 12px; }
      .tabs { grid-template-columns: 1fr; }
      h1 { font-size: 26px; }
      .bus-row { align-items: flex-start; }
      .bus-time { font-size: 14px; }
      .school { font-size: 17px; }
      .arrival-row { align-items: flex-start; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="top-row">
        <div>
          <div class="badge">🚌 Chantilly Academy Shuttle Tracker</div>
          <h1>Bus Arrival Dashboard</h1>
          <p class="subtitle">Tap a bus as it arrives. It moves into the green Arrival Order section.</p>
        </div>
        <div class="actions">
          <button class="small-button" id="resetBlockButton" type="button">↻ Reset block</button>
          <button class="small-button" id="resetAllButton" type="button">Reset all</button>
        </div>
      </div>
    </header>

    <section class="tabs" id="tabs"></section>

    <section class="panel">
      <div class="panel-head">
        <div>
          <h2 id="blockTitle">AM Arrivals</h2>
          <div class="panel-meta" id="blockMeta"></div>
        </div>
        <input class="search" id="searchInput" type="search" placeholder="Search school, bus, or time" />
      </div>

      <div class="arrival-order">
        <div class="section-heading">
          <h3>Arrival Order</h3>
          <div class="section-count" id="arrivalCount">0 recorded</div>
        </div>
        <ul class="arrival-list" id="arrivalList"></ul>
      </div>

      <div class="section-heading">
        <h3>Choose a Bus</h3>
        <div class="section-count" id="choiceCount">0 remaining</div>
      </div>
      <div class="bus-list" id="busList"></div>
    </section>
  </div>

  <script>
    const BLOCKS = [
      {
        id: "am",
        label: "AM",
        subtitle: "Periods 1 & 2",
        buses: [
          { school: "Centreville", bus: "3102", departs: "9:45 AM", eta: "9:57 AM", days: "All" },
          { school: "Fairfax", bus: "3100", departs: "9:45 AM", eta: "10:12 AM", days: "All" },
          { school: "Herndon", bus: "4101/4108", departs: "9:45 AM", eta: "10:08 AM", days: "All" },
          { school: "Robinson", bus: "3109", departs: "9:45 AM", eta: "10:10 AM", days: "All" },
          { school: "South Lakes", bus: "4105", departs: "9:45 AM", eta: "10:07 AM", days: "All" },
          { school: "Westfield", bus: "3113", departs: "9:45 AM", eta: "9:58 AM", days: "All" },
          { school: "Woodson", bus: "2101", departs: "9:45 AM", eta: "10:12 AM", days: "All" }
        ]
      },
      {
        id: "mid1",
        label: "Mid Day 1",
        subtitle: "Periods 3 & 4",
        buses: [
          { school: "Centreville", bus: "3205", departs: "11:15 AM", eta: "11:30 AM", days: "All" },
          { school: "Fairfax", bus: "3207", departs: "11:15 AM", eta: "11:38 AM", days: "All" },
          { school: "Falls Church", bus: "2233", departs: "11:15 AM", eta: "11:51 AM", days: "A-Day" },
          { school: "Herndon", bus: "4200", departs: "11:15 AM", eta: "11:38 AM", days: "All" },
          { school: "Madison", bus: "4203", departs: "11:15 AM", eta: "11:40 AM", days: "All" },
          { school: "Marshall", bus: "4211", departs: "11:15 AM", eta: "11:30 AM", days: "All" },
          { school: "McLean", bus: "4211", departs: "11:15 AM", eta: "11:40 AM", days: "A-Day" },
          { school: "Oakton/Cedar Ln", bus: "3204", departs: "11:15 AM", eta: "11:30 AM", days: "All" },
          { school: "Robinson", bus: "3215", departs: "11:15 AM", eta: "11:40 AM", days: "All" },
          { school: "South Lakes", bus: "4214", departs: "11:15 AM", eta: "11:37 AM", days: "All" },
          { school: "Westfield", bus: "3219", departs: "11:15 AM", eta: "11:28 AM", days: "All" },
          { school: "Woodson", bus: "2225", departs: "11:15 AM", eta: "11:40 AM", days: "All" }
        ]
      },
      {
        id: "mid2",
        label: "Mid Day 2",
        subtitle: "Periods 5 & 6",
        buses: [
          { school: "Centreville", bus: "3206", departs: "1:10 PM", eta: "1:22 PM", days: "All" },
          { school: "Fairfax", bus: "3208", departs: "1:10 PM", eta: "1:33 PM", days: "All" },
          { school: "Herndon", bus: "4202", departs: "1:10 PM", eta: "1:33 PM", days: "All" },
          { school: "Madison", bus: "4212", departs: "1:10 PM", eta: "1:36 PM", days: "All" },
          { school: "McLean", bus: "3214", departs: "1:10 PM", eta: "1:50 PM", days: "A-Day" },
          { school: "Robinson", bus: "3216", departs: "1:10 PM", eta: "1:35 PM", days: "All" },
          { school: "South Lakes", bus: "4215", departs: "1:10 PM", eta: "1:32 PM", days: "All" },
          { school: "Westfield", bus: "3221", departs: "1:10 PM", eta: "1:23 PM", days: "All" },
          { school: "Woodson", bus: "2250", departs: "1:10 PM", eta: "1:37 PM", days: "All" }
        ]
      }
    ];

    const STORAGE_KEY = "chantilly-bus-arrivals-html-v3";
    let activeBlockId = "am";
    let arrived = loadArrivals();

    function makeKey(blockId, bus) {
      return `${blockId}-${bus.school}-${bus.bus}`;
    }

    function isArrived(value) {
      return Boolean(value === true || (value && value.arrived));
    }

    function getArrivalOrder(value) {
      return value && typeof value === "object" ? value.order : null;
    }

    function getArrivalTime(value) {
      return value && typeof value === "object" ? value.time : null;
    }

    function formatTime(date = new Date()) {
      return date.toLocaleTimeString([], { hour: "numeric", minute: "2-digit" });
    }

    function loadArrivals() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
      } catch (error) {
        return {};
      }
    }

    function saveArrivals() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(arrived));
    }

    function getActiveBlock() {
      return BLOCKS.find(block => block.id === activeBlockId) || BLOCKS[0];
    }

    function getStats(block) {
      const total = block.buses.length;
      const count = block.buses.filter(bus => isArrived(arrived[makeKey(block.id, bus)])).length;
      const percent = Math.round((count / total) * 100);
      return { total, count, percent };
    }

    function getArrivalSequence(block) {
      return block.buses
        .map(bus => {
          const value = arrived[makeKey(block.id, bus)];
          return {
            ...bus,
            key: makeKey(block.id, bus),
            order: getArrivalOrder(value),
            time: getArrivalTime(value)
          };
        })
        .filter(bus => bus.order !== null)
        .sort((a, b) => a.order - b.order);
    }

    function getNextOrder(block) {
      const orders = block.buses
        .map(bus => getArrivalOrder(arrived[makeKey(block.id, bus)]))
        .filter(order => typeof order === "number");
      return orders.length ? Math.max(...orders) + 1 : 1;
    }

    function resequenceBlock(block) {
      const ordered = block.buses
        .map(bus => ({ bus, value: arrived[makeKey(block.id, bus)] }))
        .filter(item => isArrived(item.value))
        .sort((a, b) => (getArrivalOrder(a.value) || 999) - (getArrivalOrder(b.value) || 999));

      ordered.forEach((item, index) => {
        const key = makeKey(block.id, item.bus);
        arrived[key] = {
          arrived: true,
          order: index + 1,
          time: getArrivalTime(item.value) || "Recorded"
        };
      });
    }

    function markArrived(bus) {
      const block = getActiveBlock();
      const key = makeKey(block.id, bus);
      arrived[key] = {
        arrived: true,
        order: getNextOrder(block),
        time: formatTime()
      };
      saveArrivals();
      render();
    }

    function undoArrival(bus) {
      const block = getActiveBlock();
      const key = makeKey(block.id, bus);
      delete arrived[key];
      resequenceBlock(block);
      saveArrivals();
      render();
    }

    function renderTabs() {
      const tabs = document.getElementById("tabs");
      tabs.innerHTML = "";

      BLOCKS.forEach(block => {
        const stats = getStats(block);
        const button = document.createElement("button");
        button.className = "tab" + (block.id === activeBlockId ? " active" : "");
        button.type = "button";
        button.innerHTML = `
          <div class="percent">${stats.percent}%</div>
          <div class="tab-title">${block.label}</div>
          <div class="tab-count">${stats.count} of ${stats.total} arrived</div>
          <div class="bar"><div class="bar-fill" style="width: ${stats.percent}%"></div></div>
        `;
        button.addEventListener("click", () => {
          activeBlockId = block.id;
          document.getElementById("searchInput").value = "";
          render();
        });
        tabs.appendChild(button);
      });
    }

    function renderArrivalOrder(block) {
      const arrivalList = document.getElementById("arrivalList");
      const arrivalCount = document.getElementById("arrivalCount");
      const sequence = getArrivalSequence(block);

      arrivalCount.textContent = `${sequence.length} recorded`;
      arrivalList.innerHTML = "";

      if (sequence.length === 0) {
        const empty = document.createElement("li");
        empty.className = "empty";
        empty.textContent = "No buses have been marked arrived for this block yet.";
        arrivalList.appendChild(empty);
        return;
      }

      sequence.forEach(bus => {
        const row = document.createElement("li");
        row.className = "arrival-row";
        row.innerHTML = `
          <div class="arrival-left">
            <div class="arrival-number">${bus.order}</div>
            <div>
              <div class="arrival-school">${bus.school}</div>
              <div class="arrival-details">Bus ${bus.bus} · ${bus.time}</div>
            </div>
          </div>
          <button class="undo-button" type="button">Undo</button>
        `;
        row.querySelector(".undo-button").addEventListener("click", () => undoArrival(bus));
        arrivalList.appendChild(row);
      });
    }

    function renderChoiceList(block) {
      const query = document.getElementById("searchInput").value.toLowerCase().trim();
      const busList = document.getElementById("busList");
      const choiceCount = document.getElementById("choiceCount");

      const filteredBuses = block.buses.filter(bus => {
        if (isArrived(arrived[makeKey(block.id, bus)])) return false;
        const text = `${bus.school} ${bus.bus} ${bus.departs} ${bus.eta} ${bus.days}`.toLowerCase();
        return text.includes(query);
      });

      choiceCount.textContent = `${filteredBuses.length} remaining`;
      busList.innerHTML = "";

      if (filteredBuses.length === 0) {
        busList.innerHTML = `<div class="empty">All matching buses have been added to the arrival order.</div>`;
        return;
      }

      filteredBuses.forEach(bus => {
        const row = document.createElement("button");
        row.className = "bus-row";
        row.type = "button";
        row.innerHTML = `
          <div class="bus-left">
            <div class="check"></div>
            <div>
              <div class="school">${bus.school}</div>
              <div class="details">Bus ${bus.bus} · ${bus.days}</div>
            </div>
          </div>
          <div class="bus-time">
            ETA ${bus.eta}
            <div class="time-small">Departs ${bus.departs}</div>
          </div>
        `;
        row.addEventListener("click", () => markArrived(bus));
        busList.appendChild(row);
      });
    }

    function render() {
      const block = getActiveBlock();
      const stats = getStats(block);

      document.getElementById("blockTitle").textContent = `${block.label} Arrivals`;
      document.getElementById("blockMeta").textContent = `${block.subtitle} · ${stats.count} of ${stats.total} complete · ${stats.percent}%`;

      renderTabs();
      renderArrivalOrder(block);
      renderChoiceList(block);
    }

    document.getElementById("searchInput").addEventListener("input", () => renderChoiceList(getActiveBlock()));

    document.getElementById("resetBlockButton").addEventListener("click", () => {
      const block = getActiveBlock();
      if (!confirm(`Reset ${block.label} arrivals?`)) return;
      block.buses.forEach(bus => delete arrived[makeKey(block.id, bus)]);
      saveArrivals();
      render();
    });

    document.getElementById("resetAllButton").addEventListener("click", () => {
      if (!confirm("Reset all arrivals?")) return;
      arrived = {};
      saveArrivals();
      render();
    });

    render();
  </script>
</body>
</html>
